name: Sync Instagram Posts

on:
  schedule:
    # Run once daily at 15:00 UTC (00:00 KST)
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow deep-translator

      - name: Run sync script
        run: |
          python sync_instagram.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the synced JSON database, new WebP images, and the compiled JS file
          git add images/instagram_synced.json posts_data.js
          
          # Only stage WebP files that start with sync_ to avoid staging untracked temp files
          if ls images/sync_*.webp 1> /dev/null 2>&1; then
            git add images/sync_*.webp
          fi
          
          # Check if there are any changes staged
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync instagram posts [skip ci]"
            git push origin main
          else
            echo "No new Instagram posts to sync."
          fi
